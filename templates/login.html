<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Starlight Radio Stream</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Animated stars background - First layer */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 230px 80px, #fff, transparent),
                radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 370px 50px, #fff, transparent),
                radial-gradient(2px 2px at 450px 180px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 50px 200px, #fff, transparent),
                radial-gradient(2px 2px at 120px 250px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 200px 180px, #fff, transparent),
                radial-gradient(2px 2px at 280px 220px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 360px 280px, #fff, transparent),
                radial-gradient(2px 2px at 440px 320px, rgba(255,255,255,0.8), transparent);
            background-repeat: repeat;
            background-size: 500px 500px;
            animation: twinkle 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Second layer of stars with different speed */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 50px 100px, #fff, transparent),
                radial-gradient(2px 2px at 150px 50px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 250px 200px, #fff, transparent),
                radial-gradient(2px 2px at 350px 150px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 80px 180px, #fff, transparent),
                radial-gradient(2px 2px at 180px 280px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 280px 80px, #fff, transparent),
                radial-gradient(2px 2px at 380px 240px, rgba(255,255,255,0.9), transparent);
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: twinkle 6s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .login-container {
            background: #282828;
            border-radius: 8px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo i {
            font-size: 48px;
            color: #1DB954;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 14px;
            color: #b3b3b3;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: #3e3e3e;
            border: 1px solid #535353;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1DB954;
            background: #4a4a4a;
        }

        .form-group input::placeholder {
            color: #b3b3b3;
        }

        .error-message {
            background: #e74c3c;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1DB954;
            color: #fff;
            border: none;
            border-radius: 500px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: #1ed760;
            transform: scale(1.02);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #535353;
        }

        .divider span {
            background: #282828;
            padding: 0 16px;
            position: relative;
            color: #b3b3b3;
            font-size: 14px;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
        }

        .register-link p {
            font-size: 14px;
            color: #b3b3b3;
        }

        .register-link a {
            color: #1DB954;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #1ed760;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 32px 24px;
                margin: 20px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .logo i {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-star"></i>
            <h1>Starlight Radio Stream</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Usuario
                </label>
                <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>
        </form>

        <div class="divider">
            <span>O</span>
        </div>

        <div class="register-link">
            <p>¿No tienes una cuenta? <a href="/register">Regístrate aquí</a></p>
        </div>
    </div>
</body>
</html>
